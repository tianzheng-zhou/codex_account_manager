<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Codex 账号管理</title>
  <link rel="stylesheet" href="/design-system/colors_and_type.css">
  <link rel="stylesheet" href="/static/app.css">
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
</head>
<body data-ds>

  <!-- ===== Login / Register Screen ===== -->
  <div class="auth-screen" id="authScreen">
    <div class="auth-card">
      <div class="auth-brand">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="48" height="48">
          <circle cx="32" cy="32" r="30" fill="#C96442"/>
          <text x="32" y="44" text-anchor="middle" font-family="Literata, Georgia, serif" font-size="38" font-weight="400" fill="#FAFAF7" letter-spacing="-0.02em">C</text>
        </svg>
        <h1 class="ds-h2" style="margin:0;">Codex 账号管理</h1>
      </div>

      <!-- Login Tab -->
      <div id="authLogin">
        <div class="auth-tabs">
          <button class="auth-tab active" onclick="showAuthTab('login')">登录</button>
          <button class="auth-tab" onclick="showAuthTab('register')">注册</button>
        </div>
        <form onsubmit="handleLogin(event)">
          <label class="form-label">用户名
            <input type="text" id="loginUsername" class="input" placeholder="用户名" required autocomplete="username">
          </label>
          <label class="form-label">密码
            <input type="password" id="loginPassword" class="input" placeholder="密码" required autocomplete="current-password">
          </label>
          <div id="loginMsg" class="auth-msg" style="display:none;"></div>
          <button type="submit" class="btn btn-primary btn-block" id="loginBtn">登录</button>
        </form>
      </div>

      <!-- Register Tab -->
      <div id="authRegister" style="display:none;">
        <div class="auth-tabs">
          <button class="auth-tab" onclick="showAuthTab('login')">登录</button>
          <button class="auth-tab active" onclick="showAuthTab('register')">注册</button>
        </div>
        <form onsubmit="handleRegister(event)">
          <label class="form-label">用户名
            <input type="text" id="regUsername" class="input" placeholder="至少 2 个字符" required>
          </label>
          <label class="form-label">密码
            <input type="password" id="regPassword" class="input" placeholder="至少 8 个字符" required minlength="8">
          </label>
          <label class="form-label">确认密码
            <input type="password" id="regPassword2" class="input" placeholder="再次输入密码" required minlength="8">
          </label>
          <label class="form-label">邀请码 <span class="ds-meta">（可选，有邀请码免审核）</span>
            <input type="text" id="regInviteCode" class="input" placeholder="留空则需管理员审核">
          </label>
          <div id="regMsg" class="auth-msg" style="display:none;"></div>
          <button type="submit" class="btn btn-primary btn-block" id="regBtn">注册</button>
        </form>
      </div>
    </div>
  </div>

  <!-- ===== Main App (hidden until logged in) ===== -->
  <div class="app-layout" id="appLayout" style="display:none;">
    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-top">
        <div class="sidebar-brand">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="28" height="28" class="brand-logo">
            <circle cx="32" cy="32" r="30" fill="#C96442"/>
            <text x="32" y="44" text-anchor="middle" font-family="Literata, Georgia, serif" font-size="38" font-weight="400" fill="#FAFAF7" letter-spacing="-0.02em">C</text>
          </svg>
          <span class="sidebar-brand-text">Codex</span>
        </div>
        <nav class="sidebar-nav">
          <button class="nav-item active" data-view="dashboard" onclick="switchView('dashboard')">
            <i data-lucide="layout-dashboard"></i>
            <span class="nav-label">Dashboard</span>
          </button>
          <div class="nav-divider"></div>
          <div class="nav-section-title"><span>店铺</span></div>
          <button class="nav-item" data-view="shop:gpt-cw" onclick="switchView('shop:gpt-cw')">
            <i data-lucide="store"></i>
            <span class="nav-label">GPT专卖-cw</span>
          </button>
          <!-- Admin-only nav items -->
          <div id="adminNav" style="display:none;">
            <div class="nav-divider"></div>
            <div class="nav-section-title"><span>管理</span></div>
            <button class="nav-item" data-view="users" onclick="switchView('users')">
              <i data-lucide="users"></i>
              <span class="nav-label">用户管理</span>
            </button>
            <button class="nav-item" data-view="invites" onclick="switchView('invites')">
              <i data-lucide="ticket"></i>
              <span class="nav-label">邀请码</span>
            </button>
          </div>
        </nav>
      </div>
      <div class="sidebar-bottom">
        <div class="sidebar-user" id="sidebarUser">
          <i data-lucide="circle-user"></i>
          <span class="nav-label" id="sidebarUsername">—</span>
        </div>
        <button class="nav-item" id="adminViewToggle" onclick="toggleAdminView()" style="display:none;" title="切换管理员视角">
          <i data-lucide="eye"></i>
          <span class="nav-label">管理员视角</span>
        </button>
        <button class="nav-item" onclick="openChangePasswordModal()" title="修改密码">
          <i data-lucide="key"></i>
          <span class="nav-label">修改密码</span>
        </button>
        <button class="nav-item" onclick="handleLogout()">
          <i data-lucide="log-out"></i>
          <span class="nav-label">退出</span>
        </button>
        <button class="nav-item sidebar-toggle" onclick="toggleSidebar()">
          <i data-lucide="panel-left-close" id="toggleIcon"></i>
          <span class="nav-label">收起</span>
        </button>
      </div>
    </aside>

    <!-- Content Area -->
    <main class="content-area" id="contentArea">
      <!-- Dashboard View -->
      <div class="view" id="viewDashboard">
        <div class="view-header">
          <h1 class="view-title">Dashboard</h1>
          <p class="view-subtitle">全局账号统计总览</p>
        </div>
        <section class="stats-row" id="statsRow"></section>
      </div>

      <!-- Shop View: gpt-cw -->
      <div class="view" id="viewShopGptCw" style="display:none;">
        <div class="view-header">
          <div class="view-header-row">
            <div>
              <h1 class="view-title">GPT专卖-cw</h1>
              <p class="view-subtitle">chongzhi.art 密钥兑换 · 自动接码</p>
            </div>
            <a href="https://caowo.store/" target="_blank" rel="noopener" class="btn btn-outline btn-sm shop-link">
              <i data-lucide="external-link"></i>
              商店
            </a>
          </div>
        </div>

        <section class="stats-row" id="shopStatsRow"></section>

        <section class="redeem-section">
          <div class="redeem-card">
            <h2 class="ds-h3">一键兑换</h2>
            <p class="ds-small">输入兑换密钥，自动获取账号信息并录入系统</p>
            <div class="redeem-form">
              <input type="text" id="redeemKeyInput" class="input" placeholder="TEAM-XXXXXXXX 或 PLUS-XXXXXXXX">
              <button class="btn btn-primary" id="redeemBtn" onclick="handleRedeem()">
                <i data-lucide="key-round"></i>
                兑换
              </button>
            </div>
            <div id="redeemMsg" class="redeem-msg" style="display:none;"></div>
          </div>
        </section>

        <section class="toolbar">
          <div class="toolbar-left">
            <div class="search-box">
              <i data-lucide="search"></i>
              <input type="text" id="searchInput" class="input input-search" placeholder="搜索邮箱、密钥、备注…" oninput="debounceLoad()">
            </div>
            <select id="typeFilter" class="input input-select" onchange="loadAccounts()">
              <option value="">全部类型</option>
              <option value="Team">Team</option>
              <option value="Plus">Plus</option>
            </select>
            <select id="statusFilter" class="input input-select" onchange="loadAccounts()">
              <option value="">全部状态</option>
              <option value="available">可用</option>
              <option value="archived">已归档</option>
            </select>
            <select id="scopeFilter" class="input input-select" onchange="loadAccounts()">
              <option value="">全部可见</option>
              <option value="mine">我的</option>
              <option value="shared">共享给我</option>
              <option value="orphan" data-admin-only>无主（管理员）</option>
            </select>
          </div>
          <button class="btn btn-outline" onclick="openAddModal()">
            <i data-lucide="plus"></i>
            手动添加
          </button>
        </section>

        <section class="account-list" id="accountList">
          <div class="empty-state" id="emptyState">
            <i data-lucide="inbox" class="empty-icon"></i>
            <p>暂无账号。输入密钥兑换或手动添加。</p>
          </div>
        </section>
      </div>

      <!-- Users View (admin only) -->
      <div class="view" id="viewUsers" style="display:none;">
        <div class="view-header">
          <h1 class="view-title">用户管理</h1>
          <p class="view-subtitle">查看注册用户、审核、删除</p>
        </div>
        <section class="user-list" id="userList"></section>
      </div>

      <!-- Invite Codes View (admin only) -->
      <div class="view" id="viewInvites" style="display:none;">
        <div class="view-header">
          <div class="view-header-row">
            <div>
              <h1 class="view-title">邀请码管理</h1>
              <p class="view-subtitle">生成邀请码分享给他人注册</p>
            </div>
            <button class="btn btn-primary" onclick="generateInviteCode()">
              <i data-lucide="plus"></i>
              生成邀请码
            </button>
          </div>
        </div>
        <section class="invite-list" id="inviteList"></section>
      </div>
    </main>
  </div>

  <!-- Add/Edit Modal -->
  <div class="modal-overlay" id="modalOverlay" style="display:none;" onclick="closeModal(event)">
    <div class="modal" onclick="event.stopPropagation()">
      <div class="modal-header">
        <h3 class="ds-h3" id="modalTitle">添加账号</h3>
        <button class="btn-icon" onclick="closeModal()"><i data-lucide="x"></i></button>
      </div>
      <form id="accountForm" onsubmit="handleFormSubmit(event)">
        <input type="hidden" id="editId" value="">
        <label class="form-label">兑换密钥
          <input type="text" id="fRedeemKey" class="input" placeholder="TEAM-XXXXXXXX" required>
        </label>
        <label class="form-label">账号类型
          <select id="fAccountType" class="input input-select">
            <option value="Team">Team</option>
            <option value="Plus">Plus</option>
          </select>
        </label>
        <label class="form-label">邮箱
          <input type="text" id="fEmail" class="input" placeholder="user@example.com" required>
        </label>
        <label class="form-label">密码
          <input type="text" id="fPassword" class="input" placeholder="密码" required>
        </label>
        <label class="form-label">收码链接
          <input type="text" id="fCodeUrl" class="input" placeholder="https://...">
        </label>
        <label class="form-label">状态
          <select id="fStatus" class="input input-select">
            <option value="available">可用</option>
            <option value="archived">已归档</option>
          </select>
        </label>
        <label class="form-label">备注
          <input type="text" id="fRemark" class="input" placeholder="可选备注">
        </label>
        <div class="modal-actions">
          <button type="button" class="btn btn-outline" onclick="closeModal()">取消</button>
          <button type="submit" class="btn btn-primary" id="formSubmitBtn">保存</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Delete Confirm Modal -->
  <div class="modal-overlay" id="deleteOverlay" style="display:none;" onclick="closeDeleteModal(event)">
    <div class="modal modal-sm" onclick="event.stopPropagation()">
      <div class="modal-header">
        <h3 class="ds-h3">确认删除</h3>
        <button class="btn-icon" onclick="closeDeleteModal()"><i data-lucide="x"></i></button>
      </div>
      <p class="ds-p" style="margin:0 0 var(--space-6);">删除后无法恢复，确定要删除这个账号吗？</p>
      <div class="modal-actions">
        <button class="btn btn-outline" onclick="closeDeleteModal()">取消</button>
        <button class="btn btn-danger" id="confirmDeleteBtn">删除</button>
      </div>
    </div>
  </div>

  <!-- Code Display Modal -->
  <div class="modal-overlay" id="codeOverlay" style="display:none;" onclick="closeCodeModal(event)">
    <div class="modal modal-sm" onclick="event.stopPropagation()">
      <div class="modal-header">
        <h3 class="ds-h3">验证码</h3>
        <button class="btn-icon" onclick="closeCodeModal()"><i data-lucide="x"></i></button>
      </div>
      <div id="codeContent"></div>
    </div>
  </div>

  <!-- Share / Transfer / Claim Modal -->
  <div class="modal-overlay" id="shareOverlay" style="display:none;" onclick="closeShareModal(event)">
    <div class="modal" onclick="event.stopPropagation()">
      <div class="modal-header">
        <h3 class="ds-h3">共享与转让</h3>
        <button class="btn-icon" onclick="closeShareModal()"><i data-lucide="x"></i></button>
      </div>
      <div id="shareBody"></div>
      <div class="modal-actions">
        <button class="btn btn-outline" onclick="closeShareModal()">关闭</button>
      </div>
    </div>
  </div>

  <!-- Change Password Modal -->
  <div class="modal-overlay" id="changePwOverlay" style="display:none;" onclick="closeChangePasswordModal(event)">
    <div class="modal modal-sm" onclick="event.stopPropagation()">
      <div class="modal-header">
        <h3 class="ds-h3">修改密码</h3>
        <button class="btn-icon" onclick="closeChangePasswordModal()"><i data-lucide="x"></i></button>
      </div>
      <form id="changePwForm" onsubmit="handleChangePassword(event)">
        <label class="form-label">当前密码
          <input type="password" id="cpOldPassword" class="input" required autocomplete="current-password">
        </label>
        <label class="form-label">新密码 <span class="ds-meta">（至少 8 字符）</span>
          <input type="password" id="cpNewPassword" class="input" required autocomplete="new-password" minlength="8">
        </label>
        <label class="form-label">确认新密码
          <input type="password" id="cpNewPassword2" class="input" required autocomplete="new-password" minlength="8">
        </label>
        <div id="changePwMsg" class="auth-msg" style="display:none;"></div>
        <div class="modal-actions">
          <button type="button" class="btn btn-outline" onclick="closeChangePasswordModal()">取消</button>
          <button type="submit" class="btn btn-primary">保存</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Toast -->
  <div class="toast-container" id="toastContainer"></div>

  <script src="/static/app.js"></script>
</body>
</html>
